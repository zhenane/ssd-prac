services:
  web:
    image: nginx:alpine
    container_name: ssd-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./certs/server.crt:/etc/nginx/certs/server.crt:ro
      - ./certs/server.key:/etc/nginx/certs/server.key:ro

  app:
    build: ./app
    container_name: ssd-app
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=ssd_prac
      - DB_USER=ssd_user
      - DB_PASSWORD=2401807@sit.singaporetech.edu.sg
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: ssd-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=ssd_prac
      - POSTGRES_USER=ssd_user
      - POSTGRES_PASSWORD=2401807@sit.singaporetech.edu.sg
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssd_user -d ssd_prac"]
      interval: 5s
      timeout: 5s
      retries: 5

  gitea:
    image: gitea/gitea:latest
    container_name: ssd-gitea
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__server__DOMAIN=127.0.0.1
      - GITEA__server__ROOT_URL=http://127.0.0.1:3000/
      - GITEA__server__SSH_DOMAIN=127.0.0.1
      - GITEA__server__SSH_PORT=2222
      - GITEA__database__DB_TYPE=sqlite3
    volumes:
      - ./gitea/data:/data
    ports:
      - "3000:3000"
      - "2222:22"

volumes:
  db-data:
